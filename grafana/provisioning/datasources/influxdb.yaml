apiVersion: 1

datasources:
  - name: InfluxDB
    uid: influxdb
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: ami-org
      defaultBucket: meter_readings
      tlsSkipVerify: true
    secureJsonData:
      token: ami-influx-token
    isDefault: true
