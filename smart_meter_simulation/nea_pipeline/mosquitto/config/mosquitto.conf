# =============================================================
#  Mosquitto MQTT Broker Configuration
#  NEA AMI PoC — Balaju DCS
#  Tested with eclipse-mosquitto:2.0
#
#  MQTT topic hierarchy:
#    nea/readings/{feeder_id}/{meter_serial}
#    nea/events/{feeder_id}/{meter_serial}
#    nea/heartbeat/{dcu_id}
#    $SYS/#
# =============================================================

# -------------------------------------------------------------
# Listeners
# -------------------------------------------------------------
listener 1883
protocol mqtt

listener 9001
protocol websockets

# -------------------------------------------------------------
# Security
# PoC mode: anonymous allowed.
# Production: enable password_file + TLS below.
# -------------------------------------------------------------
allow_anonymous true

# password_file /mosquitto/config/passwd
# cafile        /mosquitto/certs/ca.crt
# certfile      /mosquitto/certs/server.crt
# keyfile       /mosquitto/certs/server.key
# require_certificate true
# tls_version tlsv1.3

# -------------------------------------------------------------
# Persistence
# -------------------------------------------------------------
persistence true
persistence_location /mosquitto/data/
persistence_file mosquitto.db
autosave_interval 60

# -------------------------------------------------------------
# Logging
# -------------------------------------------------------------
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# -------------------------------------------------------------
# Performance
# NOTE: No inline comments on value lines.
#       Mosquitto parser treats trailing text as parse errors.
# -------------------------------------------------------------
max_connections 500
max_inflight_messages 100
max_queued_messages 1000
max_packet_size 65536

# -------------------------------------------------------------
# System topic reporting interval (seconds)
# -------------------------------------------------------------
sys_interval 10
